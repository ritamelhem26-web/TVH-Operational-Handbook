 }\n<\u002Fstyle>\n<\u002Fhelmet>\n<x-import component-from-global-scope=\"doc-page\" from=\"88775aaf-ad12-4c07-a29c-899a021490f6#/doc-page.js\" size=\"{{ paperSize }}\" margin=\"0.8in\" hint-size=\"100%,1400px\" style=\"font-family:'Source Sans 3',sans-serif;color:#404447;font-size:14.5px;line-height:1.65;\">\n\n  <div slot=\"header\" style=\"display:flex;justify-content:flex-end;align-items:center;font-family:Archivo,sans-serif;font-size:9.5px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#9BA0A3;\">Field Technician — Operational Handbook<\u002Fdiv>\n  <div slot=\"footer\" style=\"display:flex;justify-content:space-between;align-items:center;font-family:Archivo,sans-serif;font-size:9.5px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#9BA0A3;\"><span>TVH | Total Ventilation &amp; Hygiene Services<\u002Fspan><span>People | Operational Handbook<\u002Fspan><\u002Fdiv>\n\n  <!-- ============ COVER ============ -->\n  <img src=\"c6087149-aa15-4396-804e-cf594638aeae\" alt=\"TVH\" style=\"width:170px;display:block;margin:4px 0 64px;\">\n  <div style=\"font-family:Archivo,sans-serif;font-size:12px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#00A3D9;margin:0 0 14px;\">People &nbsp;|&nbsp; Operational Handbook<\u002Fdiv>\n  <h1 style=\"font-family:Archivo,sans-serif;font-size:44px;font-weight:800;letter-spacing:-0.015em;line-height:1.08;color:#26292B;margin:0 0 16px;\">Field Technician<br>Operational Handbook<\u002Fh1>\n  <p style=\"font-size:17px;line-height:1.6;color:#6B7074;margin:0 0 28px;max-width:480px;\">How we do the work. Read it once, keep it close, ask if anything's unclear.<\u002Fp>\n  <div style=\"display:flex;height:6px;width:220px;margin:0 0 48px;\"><div style=\"flex:1;background:#00A3D9;\"><\u002Fdiv><div style=\"flex:1;background:#71BF44;\"><\u002Fdiv><div style=\"flex:1;background:#009D4C;\"><\u002Fdiv><div style=\"flex:1;background:#E7E614;\"><\u002Fdiv><\u002Fdiv>\n\n  <h4 style=\"font-family:Archivo,sans-serif;font-size:12px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:#26292B;margin:0 0 10px;\">About this handbook<\u002Fh4>\n  <div style=\"display:grid;grid-template-columns:170px 1fr;border-top:2px solid #26292B;font-size:13.5px;line-height:1.55;\">\n    <div style=\"padding:10px 14px 10px 0;border-bottom:1px solid #DDE0E1;font-weight:700;color:#26292B;\">What this handbook is<\u002Fdiv>\n    <div style=\"padding:10px 0;border-bottom:1px solid #DDE0E1;\">The operational standard for how TVH field technicians work, communicate, look after their vehicle and tools, and represent TVH on customer sites.<\u002Fdiv>\n    <div style=\"padding:10px 14px 10px 0;border-bottom:1px solid #DDE0E1;font-weight:700;color:#26292B;\">What it isn't<\u002Fdiv>\n    <div style=\"padding:10px 0;border-bottom:1px solid #DDE0E1;\">HR policy detail (leave, pay, super, code of conduct, grievance, EAP). Those live in Safety Culture and are referenced where relevant.<\u002Fdiv>\n    <div style=\"padding:10px 14px 10px 0;border-bottom:1px solid #DDE0E1;font-weight:700;color:#26292B;\">Audience<\u002Fdiv>\n    <div style=\"padding:10px 0;border-bottom:1px solid #DDE0E1;\">All TVH field technicians across HVAC, hygiene, fire, electrical, plumbing, handyman, grounds maintenance.<\u002Fdiv>\n    <div style=\"padding:10px 14px 10px 0;border-bottom:1px solid #DDE0E1;font-weight:700;color:#26292B;\">Status<\u002Fdiv>\n    <div style=\"padding:10px 0;border-bottom:1px solid #DDE0E1;\">The operational baseline. Service-line specific SOPs add detail; they don't override this.<\u002Fdiv>\n    <div style=\"padding:10px 14px 10px 0;border-bottom:1px solid #DDE0E1;font-weight:700;color:#26292B;\">Owner<\u002Fdiv>\n    <div style=\"padding:10px 0;border-bottom:1px solid #DDE0E1;\">National People Manager (Rita Ruisi). Service-line content reviewed by operations leads.<\u002Fdiv>\n    <div style=\"padding:10px 14px 10px 0;border-bottom:1px solid #DDE0E1;font-weight:700;color:#26292B;\">Review cycle<\u002Fdiv>\n    <div style=\"padding:10px 0;border-bottom:1px solid #DDE0E1;\">Annual. Technician feedback drives revisions.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ 1. WELCOME ============ -->\n  <h2 data-screen-label=\"1. Welcome to TVH\" style=\"font-family:Archivo,sans-serif;font-size:27px;font-weight:800;letter-spacing:-0.01em;color:#26292B;margin:56px 0 18px;padding-bottom:12px;border-bottom:3px solid #26292B;\"><span style=\"color:#00A3D9;\">1&nbsp;&nbsp;<\u002Fspan>Welcome to TVH<\u002Fh2>\n  <p style=\"margin:0 0 10px;\">This handbook is for you. It exists because we want you to do the work well, look after yourself on the road, and know what TVH expects without having to guess.<\u002Fp>\n  <p style=\"margin:0 0 10px;\">You'll find the policy detail (leave, pay, code of conduct, EAP) in Safety Culture, which you'll have been set up with during your first week. This handbook is the operational part. How we work. How we look after the vehicle. How we talk to customers. How portal updates happen. The everyday stuff that makes the difference between a good day and a difficult one.<\u002Fp>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">1.1&nbsp;&nbsp;<\u002Fspan>Who TVH is<\u002Fh3>\n  <p style=\"margin:0 0 10px;\">TVH (Total Ventilation &amp; Hygiene Services) is an Australian heating, ventilation, air conditioning, and refrigeration services business. We also deliver HVAC hygiene, fire, electrical, commercial plumbing, general handyman, and grounds maintenance work across customer sites nationally.<\u002Fp>\n  <p style=\"margin:0 0 10px;\">Our customers include defence, government, commercial property, and large industrial sites. They count on us to turn up when we said we would, do the work to standard, communicate honestly when something goes wrong, and leave the site safer and cleaner than we found it.<\u002Fp>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">1.2&nbsp;&nbsp;<\u002Fspan>Our values<\u002Fh3>\n  <p style=\"margin:0 0 10px;\">TVH has four corporate values. They aren't wall decoration. You'll see how they show up across this handbook.<\u002Fp>\n  <table style=\"width:100%;border-collapse:collapse;font-size:13.5px;line-height:1.55;margin:14px 0;\">\n    <thead><tr>\n      <th style=\"background:#26292B;color:#FFFFFF;text-align:left;padding:8px 12px;font-family:Archivo,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;width:130px;\">Value<\u002Fth>\n      <th style=\"background:#26292B;color:#FFFFFF;text-align:left;padding:8px 12px;font-family:Archivo,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;\">What it means in field work<\u002Fth>\n    <\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:700;color:#26292B;\">Transparency<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Open, honest communication. Log defects honestly. Write web notes that reflect reality. Tell your supervisor when something isn't working before it becomes a problem.<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:700;color:#26292B;\">Awareness<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Connected to the work, and to each other as people. Notice when a teammate is overloaded. Notice when you are. Ask for help; offer help.<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:700;color:#26292B;\">Fun<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Real, not staged. Camaraderie on the road. Banter with the team. The annual 'Behind the Work' event. We don't do forced fun.<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:700;color:#26292B;\">Diversity<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Inclusive and supportive of everyone. The TVH workforce includes people of every background, age, and walk of life. We expect everyone to behave accordingly.<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">1.3&nbsp;&nbsp;<\u002Fspan>Where to find what<\u002Fh3>\n  <table style=\"width:100%;border-collapse:collapse;font-size:13.5px;line-height:1.55;margin:14px 0;\">\n    <thead><tr>\n      <th style=\"background:#26292B;color:#FFFFFF;text-align:left;padding:8px 12px;font-family:Archivo,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;\">You need…<\u002Fth>\n      <th style=\"background:#26292B;color:#FFFFFF;text-align:left;padding:8px 12px;font-family:Archivo,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;width:44%;\">Look here<\u002Fth>\n    <\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">How to do the work, the standard, the kit, the customers<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:600;color:#26292B;\">This handbook<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Pay, leave, super, payslips<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:600;color:#26292B;\">Safety Culture › People › Payroll<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Code of conduct, grievance, EAP<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:600;color:#26292B;\">Safety Culture › People › Policy<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Specific service-line technical SOPs (HVAC, fire, electrical etc)<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:600;color:#26292B;\">Safety Culture › Operations › [service line]<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Vehicle and PPE policy detail<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:600;color:#26292B;\">Safety Culture › HSEQ<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Training and competency records<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:600;color:#26292B;\">Safety Culture › Learning<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Customer-specific protocols and access<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:600;color:#26292B;\">Talk to your AM or scheduler<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">A question this handbook doesn't answer<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:600;color:#26292B;\">Your senior tech, your AM, or HR. Don't sit on it.<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <!-- ============ 2. DAILY RHYTHM ============ -->\n  <h2 data-screen-label=\"2. The daily rhythm\" style=\"font-family:Archivo,sans-serif;font-size:27px;font-weight:800;letter-spacing:-0.01em;color:#26292B;margin:56px 0 18px;padding-bottom:12px;border-bottom:3px solid #26292B;\"><span style=\"color:#00A3D9;\">2&nbsp;&nbsp;<\u002Fspan>The daily rhythm<\u002Fh2>\n  <p style=\"margin:0 0 10px;\">Most days at TVH follow a predictable shape. Knowing the rhythm makes the days that don't go to plan feel less chaotic.<\u002Fp>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">2.1&nbsp;&nbsp;<\u002Fspan>Start of day<\u002Fh3>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\">Depot or first-job arrival: be ready, not arriving. If you start at 7am, you're parked and ready by 6:55, not turning into the carpark at 7:05.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Vehicle pre-start check (see Section 4.2). Daily, not just on Mondays.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Tools and PPE confirmed. Anything missing, raise it before you leave the depot.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Open the portal and review your day's run. Confirm the route makes sense.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Acknowledge the first job to the scheduler if expected.<\u002Fli>\n  <\u002Ful>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">2.2&nbsp;&nbsp;<\u002Fspan>On the road<\u002Fh3>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\">Update the customer portal on arrival at every site, every time. No exceptions.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Greet the customer professionally. Use names if you have them. Confirm the scope before you start.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Do the work to TVH standard, not the standard you'd accept at home. We're held to a higher bar.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Update the portal on completion, on-hold, or any status change.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Web notes are mandatory on any incomplete job. What's outstanding, why, the rebook plan.<\u002Fli>\n  <\u002Ful>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">2.3&nbsp;&nbsp;<\u002Fspan>Between jobs<\u002Fh3>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\">Take your breaks. The work is physical; skipping breaks affects job 5 of the day.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Use travel time to check in with the scheduler if anything's changed.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Eat lunch. Not 'maybe later'. Lunch.<\u002Fli>\n  <\u002Ful>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">2.4&nbsp;&nbsp;<\u002Fspan>End of day<\u002Fh3>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\">Final job's portal update completed before you leave the site.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Vehicle returned or parked correctly per the fleet policy.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Timesheet hours entered (8 or 7.6 per shift, see Section 5.1).<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Tools reconciled. Anything missing or damaged, log it now, not next week.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Web notes confirmed on any incomplete jobs from the day.<\u002Fli>\n  <\u002Ful>\n  <div style=\"display:flex;gap:14px;background:#EAF5EC;padding:14px 16px;margin:16px 0;break-inside:avoid;\"><div style=\"font-family:Archivo,sans-serif;font-size:10.5px;font-weight:800;letter-spacing:0.09em;color:#00813E;white-space:nowrap;padding-top:3px;\">WHY THIS MATTERS<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.6;\">Schedulers depend on you completing the loop at end of day. The next morning's calendar is built from your portal updates and timesheet entries the night before. If your end-of-day is rushed, the whole next day is downstream of that rush.<\u002Fdiv><\u002Fdiv>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">2.5&nbsp;&nbsp;<\u002Fspan>The weekly questionnaire (AMs only, but worth knowing)<\u002Fh3>\n  <p style=\"margin:0 0 10px;\">Your AM completes a 15-question summary every Friday afternoon covering timesheets, billable hours, recruitment, quotes, KPI hits and misses, and aged jobs. Some of those answers come from your work that week. If your AM asks for a status update late Friday, that's why.<\u002Fp>\n\n  <!-- ============ 3. COMMUNICATION ============ -->\n  <h2 data-screen-label=\"3. How we communicate\" style=\"font-family:Archivo,sans-serif;font-size:27px;font-weight:800;letter-spacing:-0.01em;color:#26292B;margin:56px 0 18px;padding-bottom:12px;border-bottom:3px solid #26292B;\"><span style=\"color:#00A3D9;\">3&nbsp;&nbsp;<\u002Fspan>How we communicate<\u002Fh2>\n  <p style=\"margin:0 0 10px;\">Communication is where most operational problems start, and where most get solved. The standards in this section apply across every service line.<\u002Fp>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">3.1&nbsp;&nbsp;<\u002Fspan>The two-channel principle<\u002Fh3>\n  <p style=\"margin:0 0 10px;\">TVH runs on two communication channels: the customer portal and direct comms (phone, Teams, SMS). They serve different purposes.<\u002Fp>\n  <table style=\"width:100%;border-collapse:collapse;font-size:13.5px;line-height:1.55;margin:14px 0;\">\n    <thead><tr>\n      <th style=\"background:#26292B;color:#FFFFFF;text-align:left;padding:8px 12px;font-family:Archivo,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;width:26%;\">Channel<\u002Fth>\n      <th style=\"background:#26292B;color:#FFFFFF;text-align:left;padding:8px 12px;font-family:Archivo,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;\">Use for<\u002Fth>\n      <th style=\"background:#26292B;color:#FFFFFF;text-align:left;padding:8px 12px;font-family:Archivo,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;\">Don't use for<\u002Fth>\n    <\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:700;color:#26292B;\">Customer portal (Bsafe, SWAP, others)<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Job status, arrival, on-hold, completion, web notes, formal customer-visible record<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Banter, private notes, anything you wouldn't want a customer to see<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:700;color:#26292B;\">Direct comms (phone, Teams, SMS)<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Time-critical updates to scheduler or AM, scope questions, customer issues, anything that needs a conversation<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Anything that should be in the portal for the record<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">3.2&nbsp;&nbsp;<\u002Fspan>Portal updates: the four moments<\u002Fh3>\n  <p style=\"margin:0 0 10px;\">Every job has four portal moments. Miss any one of them and the customer sees a gap.<\u002Fp>\n  <ol style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\"><strong style=\"color:#26292B;\">Arrival.<\u002Fstrong> The moment you're on site. Not 'when I've parked and checked my tools'. On arrival.<\u002Fli>\n    <li style=\"margin:0 0 6px;\"><strong style=\"color:#26292B;\">On-hold.<\u002Fstrong> If the job goes on hold for any reason (parts, access, customer call-back), update the portal with the reason.<\u002Fli>\n    <li style=\"margin:0 0 6px;\"><strong style=\"color:#26292B;\">Completion.<\u002Fstrong> The moment you've finished. Not 'when I'm back in the van'. Before you walk out.<\u002Fli>\n    <li style=\"margin:0 0 6px;\"><strong style=\"color:#26292B;\">Web notes.<\u002Fstrong> If the job is incomplete for any reason, web notes must capture: what's outstanding, why, and the rebook plan.<\u002Fli>\n  <\u002Fol>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">3.3&nbsp;&nbsp;<\u002Fspan>Phone vs Teams vs SMS<\u002Fh3>\n  <p style=\"margin:0 0 10px;\">When you need to contact a scheduler or AM, the channel matters.<\u002Fp>\n  <table style=\"width:100%;border-collapse:collapse;font-size:13.5px;line-height:1.55;margin:14px 0;\">\n    <thead><tr>\n      <th style=\"background:#26292B;color:#FFFFFF;text-align:left;padding:8px 12px;font-family:Archivo,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;width:38%;\">If you need…<\u002Fth>\n      <th style=\"background:#26292B;color:#FFFFFF;text-align:left;padding:8px 12px;font-family:Archivo,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;width:22%;\">Use<\u002Fth>\n      <th style=\"background:#26292B;color:#FFFFFF;text-align:left;padding:8px 12px;font-family:Archivo,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;\">Why<\u002Fth>\n    <\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">An answer in the next hour<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:700;color:#26292B;\">Phone<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Voicemail counts as contact attempt. Teams can sit unread.<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">A status check or non-urgent question<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:700;color:#26292B;\">Teams<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Less interruptive for the scheduler.<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Quick update on the road<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:700;color:#26292B;\">SMS or Teams<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Easier with one thumb.<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">To raise a concern or report something significant<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:700;color:#26292B;\">Phone, follow up in Teams<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Verbal first for tone, written for the record.<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">3.4&nbsp;&nbsp;<\u002Fspan>Web notes: what good looks like<\u002Fh3>\n  <p style=\"margin:0 0 10px;\">Web notes are the record that lives on after you've left the site. The next tech reads them. The customer reads them. Sometimes a lawyer reads them. Write accordingly.<\u002Fp>\n  <div style=\"display:flex;gap:14px;background:#EAF5EC;padding:14px 16px;margin:14px 0;break-inside:avoid;\"><div style=\"font-family:Archivo,sans-serif;font-size:10.5px;font-weight:800;letter-spacing:0.09em;color:#00813E;white-space:nowrap;padding-top:3px;\">GOOD<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.6;font-style:italic;\">'Attended for annual fire inspection. Sprinkler valve in B2 needs replacement, valve sticking on test. Other systems passed. Customer notified, replacement quoted, awaiting approval. Recommend rebook within 2 weeks to complete.'<\u002Fdiv><\u002Fdiv>\n  <div style=\"display:flex;gap:14px;background:#F2F3F4;padding:14px 16px;margin:14px 0;break-inside:avoid;\"><div style=\"font-family:Archivo,sans-serif;font-size:10.5px;font-weight:800;letter-spacing:0.09em;color:#84898C;white-space:nowrap;padding-top:3px;\">BAD<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.6;font-style:italic;color:#6B7074;\">'Attended for inspection. Issues found. Will return.'<\u002Fdiv><\u002Fdiv>\n  <p style=\"margin:0 0 10px;\">The good note tells the next person everything they need. The bad note tells them nothing. The standard is: write notes assuming you won't be the one returning.<\u002Fp>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">3.5&nbsp;&nbsp;<\u002Fspan>The scheduler relationship<\u002Fh3>\n  <p style=\"margin:0 0 10px;\">Schedulers are not your boss. They're not the customer. They're the people who keep your day functional and the customer's expectations managed. They depend on you to:<\u002Fp>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\">Update the portal in real time, not at end of day<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Answer calls and messages within a reasonable window during work hours<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Tell them early when a job will run long<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Flag any customer issue before the customer rings them about it<\u002Fli>\n  <\u002Ful>\n  <p style=\"margin:0 0 10px;\">In return, you should expect from your scheduler:<\u002Fp>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\">Clear job briefings and accurate calendar entries<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Proactive notification of changes to your run<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Direct, respectful communication when something needs to change<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Backup with the customer when the customer is being unreasonable<\u002Fli>\n  <\u002Ful>\n  <div style=\"display:flex;gap:14px;background:#E8F5FB;padding:14px 16px;margin:16px 0;break-inside:avoid;\"><div style=\"font-family:Archivo,sans-serif;font-size:10.5px;font-weight:800;letter-spacing:0.09em;color:#007FB0;white-space:nowrap;padding-top:3px;\">SAFETY CULTURE<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.6;\">If you have a concern about how a scheduler has treated you, or how an AM has handled a situation, raise it via the grievance pathway in Safety Culture. Don't sit on it.<\u002Fdiv><\u002Fdiv>\n\n  <!-- ============ 4. VEHICLE, TOOLS, PPE ============ -->\n  <h2 data-screen-label=\"4. Vehicle, tools, PPE\" style=\"font-family:Archivo,sans-serif;font-size:27px;font-weight:800;letter-spacing:-0.01em;color:#26292B;margin:56px 0 18px;padding-bottom:12px;border-bottom:3px solid #26292B;\"><span style=\"color:#00A3D9;\">4&nbsp;&nbsp;<\u002Fspan>Vehicle, tools, PPE<\u002Fh2>\n  <p style=\"margin:0 0 10px;\">Your vehicle and tools are TVH property under your care. The standard isn't 'good enough'. The standard is: ready to go to a job tomorrow without surprises.<\u002Fp>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">4.1&nbsp;&nbsp;<\u002Fspan>Your vehicle<\u002Fh3>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\">Your vehicle is assigned to you. You're responsible for its day-to-day condition, fuel, cleanliness, and reporting any issue.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Personal use of the vehicle is governed by TVH's fleet policy in Safety Culture. Default position: TVH vehicles are for TVH work and reasonable commute. Anything else, ask.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">If you have a near-miss, an incident, or any damage (including someone else hitting you), report it the same day. Don't try to handle it yourself.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Don't smoke in the vehicle. Don't let anyone else smoke in the vehicle.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Keep the cabin and rear professional. A customer will see the back of the van when you open it.<\u002Fli>\n  <\u002Ful>\n  <div style=\"display:flex;gap:14px;background:#E8F5FB;padding:14px 16px;margin:16px 0;break-inside:avoid;\"><div style=\"font-family:Archivo,sans-serif;font-size:10.5px;font-weight:800;letter-spacing:0.09em;color:#007FB0;white-space:nowrap;padding-top:3px;\">SAFETY CULTURE<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.6;\">Full vehicle policy, accident reporting forms, and fleet protocols are in Safety Culture › HSEQ › Fleet.<\u002Fdiv><\u002Fdiv>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">4.2&nbsp;&nbsp;<\u002Fspan>The daily pre-start check<\u002Fh3>\n  <p style=\"margin:0 0 10px;\">Five minutes at the start of every day. Not optional, not 'when you remember'.<\u002Fp>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\">Walk-around: tyres, lights, mirrors, body damage, anything new since yesterday<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Under-bonnet (weekly minimum, daily if you're spending all day on the road): oil, coolant, washer fluid<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Inside the cab: dash warning lights, fuel level, anything indicating an issue<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Rear: tools secured, PPE present, first aid kit and fire extinguisher in date<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Anything wrong, log it. If unsafe, don't drive it. Phone your supervisor.<\u002Fli>\n  <\u002Ful>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">4.3&nbsp;&nbsp;<\u002Fspan>Tools<\u002Fh3>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\">Your TVH-issued tools are listed in your kit register, signed for on Day 1 or Day 2.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">BYO tools (where applicable) are insured and reimbursed per TVH's tool policy in Safety Culture.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Lost or damaged tools must be reported promptly. The replacement process isn't punitive; the delay is what causes problems.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Don't lend TVH tools to non-TVH people. Don't borrow tools from customers.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Calibrated test instruments (where used) have a calibration cycle. Don't use a tool past its calibration date.<\u002Fli>\n  <\u002Ful>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">4.4&nbsp;&nbsp;<\u002Fspan>PPE<\u002Fh3>\n  <p style=\"margin:0 0 10px;\">PPE isn't a checklist. It's how you go home in the same condition you arrived.<\u002Fp>\n  <h4 style=\"font-family:Archivo,sans-serif;font-size:12.5px;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;color:#26292B;margin:20px 0 8px;\">Always required on site<\u002Fh4>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\">Hi-vis (TVH branded)<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Safety boots or appropriate footwear for the site<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Long pants and long sleeves (heat or weather variations covered by service-line policy)<\u002Fli>\n  <\u002Ful>\n  <h4 style=\"font-family:Archivo,sans-serif;font-size:12.5px;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;color:#26292B;margin:20px 0 8px;\">Job-specific (see service-line SOP)<\u002Fh4>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\">Hard hat (where required)<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Eye protection (welding, grinding, cutting, anything with debris)<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Hearing protection (noisy plant, percussive tools)<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Respiratory (refrigerant work, dusty environments, certain hygiene work)<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Cut-resistant gloves (sharp edges, sheet metal)<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Fall protection (heights, certain HVAC work, certain roof work)<\u002Fli>\n  <\u002Ful>\n  <div style=\"display:flex;gap:14px;background:#26292B;padding:16px 18px;margin:16px 0;break-inside:avoid;\"><div style=\"font-family:Archivo,sans-serif;font-size:10.5px;font-weight:800;letter-spacing:0.09em;color:#E7E614;white-space:nowrap;padding-top:3px;\">ABSOLUTE<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.6;color:#FFFFFF;\">If you don't have the right PPE for a job, the job doesn't happen until you do. Period. Not 'I'll be quick'. The job. Doesn't. Happen.<\u002Fdiv><\u002Fdiv>\n  <div style=\"display:flex;gap:14px;background:#E8F5FB;padding:14px 16px;margin:16px 0;break-inside:avoid;\"><div style=\"font-family:Archivo,sans-serif;font-size:10.5px;font-weight:800;letter-spacing:0.09em;color:#007FB0;white-space:nowrap;padding-top:3px;\">SAFETY CULTURE<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.6;\">PPE allocation, fit-testing, replacement cycle and reimbursement are all in Safety Culture › HSEQ › PPE.<\u002Fdiv><\u002Fdiv>\n\n  <!-- ============ 5. TIME ============ -->\n  <h2 data-screen-label=\"5. Time, timesheets, and being on site\" style=\"font-family:Archivo,sans-serif;font-size:27px;font-weight:800;letter-spacing:-0.01em;color:#26292B;margin:56px 0 18px;padding-bottom:12px;border-bottom:3px solid #26292B;\"><span style=\"color:#00A3D9;\">5&nbsp;&nbsp;<\u002Fspan>Time, timesheets, and being on site<\u002Fh2>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">5.1&nbsp;&nbsp;<\u002Fspan>Timesheet basics<\u002Fh3>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\">Every shift is 8 hours or 7.6 hours depending on your contract. Enter the actual time, not a guess.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Timesheets are entered daily, submitted by 10am Monday at the latest.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Travel time, breaks, on-site time, on-hold time are recorded separately if your role requires it.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">If you've worked overtime or a callout, enter it under the right category. Don't bury it in the regular hours, and don't inflate regular hours to compensate.<\u002Fli>\n  <\u002Ful>\n  <div style=\"display:flex;gap:14px;background:#E8F5FB;padding:14px 16px;margin:16px 0;break-inside:avoid;\"><div style=\"font-family:Archivo,sans-serif;font-size:10.5px;font-weight:800;letter-spacing:0.09em;color:#007FB0;white-space:nowrap;padding-top:3px;\">SAFETY CULTURE<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.6;\">Timesheet submission, leave booking, and overtime approval all go through Safety Culture › People › Time.<\u002Fdiv><\u002Fdiv>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">5.2&nbsp;&nbsp;<\u002Fspan>Being on site, on time<\u002Fh3>\n  <p style=\"margin:0 0 10px;\">Customers judge TVH on whether we turn up when we said we would. They don't care that traffic was bad.<\u002Fp>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\">Plan to arrive 10 minutes before the booked time, not at the booked time.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">If you're going to be late by more than 5 minutes, the scheduler hears about it before the customer does. Phone, not Teams.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Update the portal on arrival, every time. The customer is watching for the change.<\u002Fli>\n  <\u002Ful>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">5.3&nbsp;&nbsp;<\u002Fspan>If you can't make a job<\u002Fh3>\n  <p style=\"margin:0 0 10px;\">Sick days, family emergencies, vehicle breakdowns. They happen. The standard is in how you handle them, not whether they happen.<\u002Fp>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\">Phone your scheduler (or AM, if scheduler is unreachable) as early as possible. Not Teams. Phone.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Give them what they need to replan: are you out for the day or just the morning, can you do tomorrow, do you need someone to attend in your place urgently.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">If it's a vehicle issue, the fleet team is involved too. One call to scheduler, one call to fleet, in that order.<\u002Fli>\n  <\u002Ful>\n  <div style=\"display:flex;gap:14px;background:#E8F5FB;padding:14px 16px;margin:16px 0;break-inside:avoid;\"><div style=\"font-family:Archivo,sans-serif;font-size:10.5px;font-weight:800;letter-spacing:0.09em;color:#007FB0;white-space:nowrap;padding-top:3px;\">SAFETY CULTURE<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.6;\">Sick leave, personal leave and emergency leave protocols are in Safety Culture › People › Leave.<\u002Fdiv><\u002Fdiv>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">5.4&nbsp;&nbsp;<\u002Fspan>After-hours, on-call, callouts<\u002Fh3>\n  <p style=\"margin:0 0 10px;\">Some service lines (particularly fire, plumbing, refrigeration emergencies) have after-hours rotations. If you're on the roster, you should know:<\u002Fp>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\">When your rotation is on (it should be in your calendar)<\u002Fli>\n    <li style=\"margin:0 0 6px;\">How callouts are paid (separate to your regular hours; see your contract or Safety Culture)<\u002Fli>\n    <li style=\"margin:0 0 6px;\">The response time expected (varies by customer contract; ask your AM if unclear)<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Who you call if you can't take the callout for any reason (don't ignore the call)<\u002Fli>\n  <\u002Ful>\n  <div style=\"display:flex;gap:14px;background:#FAF9DE;padding:14px 16px;margin:16px 0;break-inside:avoid;\"><div style=\"font-family:Archivo,sans-serif;font-size:10.5px;font-weight:800;letter-spacing:0.09em;color:#7C7A12;white-space:nowrap;padding-top:3px;\">PAY MATTERS<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.6;\">After-hours work is paid separately to your regular hours under TVH's enterprise agreement. If you're being asked to do after-hours work and you're not sure how it's being paid, raise it with your AM. Don't quietly absorb it.<\u002Fdiv><\u002Fdiv>\n\n  <!-- ============ 6. CUSTOMERS ============ -->\n  <h2 data-screen-label=\"6. Customers\" style=\"font-family:Archivo,sans-serif;font-size:27px;font-weight:800;letter-spacing:-0.01em;color:#26292B;margin:56px 0 18px;padding-bottom:12px;border-bottom:3px solid #26292B;\"><span style=\"color:#00A3D9;\">6&nbsp;&nbsp;<\u002Fspan>Customers<\u002Fh2>\n  <p style=\"margin:0 0 10px;\">TVH wins and loses on customer experience. The product (the work) is half of it. The way the customer feels treated is the other half.<\u002Fp>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">6.1&nbsp;&nbsp;<\u002Fspan>The customer-first principles<\u002Fh3>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\">Arrive when you said you would. If you can't, they hear about it before they have to ask.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Greet them properly. Names if you have them. Eye contact. A handshake if the situation calls for it.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Confirm the scope before you start. 'Right, I understand I'm here for X. Anything else come up since the booking?' Catches scope creep early.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Do the work to the standard the customer would see at the head office, not the standard you'd accept under pressure.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Leave the site cleaner than you found it. Mop up. Vacuum if you generated dust. Take your rubbish.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Close out professionally. Confirm what's done. Explain any incomplete items honestly. Tell them when the next attendance is if relevant.<\u002Fli>\n  <\u002Ful>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">6.2&nbsp;&nbsp;<\u002Fspan>Customer comms during a job<\u002Fh3>\n  <p style=\"margin:0 0 10px;\">Most customers are reasonable. The ones who aren't deserve the same professional response.<\u002Fp>\n  <h4 style=\"font-family:Archivo,sans-serif;font-size:12.5px;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;color:#26292B;margin:20px 0 8px;\">If a customer asks a question outside your scope<\u002Fh4>\n  <div style=\"display:flex;gap:14px;background:#F2F3F4;border-left:none;padding:14px 16px;margin:10px 0;break-inside:avoid;\"><div style=\"font-family:Archivo,sans-serif;font-size:10.5px;font-weight:800;letter-spacing:0.09em;color:#00813E;white-space:nowrap;padding-top:3px;\">SCRIPT<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.6;font-style:italic;\">'Good question, that's outside what I'm here for today, but let me make sure it gets to the right person. I'll mention it to my scheduler and they'll come back to you with an answer or arrange the right person.'<\u002Fdiv><\u002Fdiv>\n  <h4 style=\"font-family:Archivo,sans-serif;font-size:12.5px;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;color:#26292B;margin:20px 0 8px;\">If a customer asks for extra work on the spot<\u002Fh4>\n  <div style=\"display:flex;gap:14px;background:#F2F3F4;padding:14px 16px;margin:10px 0;break-inside:avoid;\"><div style=\"font-family:Archivo,sans-serif;font-size:10.5px;font-weight:800;letter-spacing:0.09em;color:#00813E;white-space:nowrap;padding-top:3px;\">SCRIPT<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.6;font-style:italic;\">'I can do it if it's small. Anything more, I need to get it priced and approved first. Want me to flag it with my scheduler now so we can come back?'<\u002Fdiv><\u002Fdiv>\n  <h4 style=\"font-family:Archivo,sans-serif;font-size:12.5px;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;color:#26292B;margin:20px 0 8px;\">If a customer is unhappy with the work<\u002Fh4>\n  <div style=\"display:flex;gap:14px;background:#F2F3F4;padding:14px 16px;margin:10px 0;break-inside:avoid;\"><div style=\"font-family:Archivo,sans-serif;font-size:10.5px;font-weight:800;letter-spacing:0.09em;color:#00813E;white-space:nowrap;padding-top:3px;\">SCRIPT<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.6;font-style:italic;\">'I appreciate you telling me directly. Let me walk through what I've done and we can identify what isn't meeting your expectation. If I can fix it now, I will. If I can't, I'll make sure it's escalated properly.'<\u002Fdiv><\u002Fdiv>\n  <h4 style=\"font-family:Archivo,sans-serif;font-size:12.5px;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;color:#26292B;margin:20px 0 8px;\">If a customer is rude or unreasonable<\u002Fh4>\n  <div style=\"display:flex;gap:14px;background:#F2F3F4;padding:14px 16px;margin:10px 0;break-inside:avoid;\"><div style=\"font-family:Archivo,sans-serif;font-size:10.5px;font-weight:800;letter-spacing:0.09em;color:#00813E;white-space:nowrap;padding-top:3px;\">SCRIPT<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.6;font-style:italic;\">'I want to get this resolved. I'm going to step away briefly and call my supervisor to make sure I'm doing the right thing here. Bear with me.'<\u002Fdiv><\u002Fdiv>\n  <p style=\"margin:0 0 10px;\">Then call your AM. Don't tough it out alone.<\u002Fp>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">6.3&nbsp;&nbsp;<\u002Fspan>Customer-specific protocols<\u002Fh3>\n  <p style=\"margin:0 0 10px;\">Some customer sites have specific access requirements, induction protocols, escort rules, sign-in procedures, or PPE additions. Your AM or scheduler will brief you before you attend a new site for the first time. If they haven't, ask.<\u002Fp>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">6.4&nbsp;&nbsp;<\u002Fspan>What we never do with customers<\u002Fh3>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\">Bad-mouth other TVH staff, even if there's a real issue. Raise it internally.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Bad-mouth other contractors on site. Stay focused on the work.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Promise a fix you can't guarantee. Better to escalate than over-promise.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Discuss pricing on the spot. Pricing goes through the AM or sales team.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Accept gifts beyond a coffee or a sandwich. If a customer offers more, decline politely and tell your AM.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Argue. The work site is not a debate. If something needs raising, do it later, through the right channel.<\u002Fli>\n  <\u002Ful>\n  <div style=\"display:flex;gap:14px;background:#E8F5FB;padding:14px 16px;margin:16px 0;break-inside:avoid;\"><div style=\"font-family:Archivo,sans-serif;font-size:10.5px;font-weight:800;letter-spacing:0.09em;color:#007FB0;white-space:nowrap;padding-top:3px;\">SAFETY CULTURE<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.6;\">If a customer says or does something that crosses a line (harassment, discrimination, threats), this is a Safety Culture matter, not a customer service matter. Stop the job politely, leave the site safely, and report it to HR via Safety Culture › People › Incidents the same day.<\u002Fdiv><\u002Fdiv>\n\n  <!-- ============ 7. SAFETY ============ -->\n  <h2 data-screen-label=\"7. Safety on site\" style=\"font-family:Archivo,sans-serif;font-size:27px;font-weight:800;letter-spacing:-0.01em;color:#26292B;margin:56px 0 18px;padding-bottom:12px;border-bottom:3px solid #26292B;\"><span style=\"color:#00A3D9;\">7&nbsp;&nbsp;<\u002Fspan>Safety on site<\u002Fh2>\n  <p style=\"margin:0 0 10px;\">Safety isn't a TVH value. It's the baseline. Without it nothing else matters.<\u002Fp>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">7.1&nbsp;&nbsp;<\u002Fspan>The non-negotiables<\u002Fh3>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\"><strong style=\"color:#26292B;\">Stop work authority.<\u002Fstrong> Anyone can stop a job if they see an unsafe situation. You don't need permission. You don't need to be senior. You stop it.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">If you don't have the right PPE, the job doesn't happen until you do.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">If you haven't been inducted to the site, you don't go past the gate.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">If a procedure is unsafe as written, you don't do it the unsafe way. You stop and ask.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">If you've had a near-miss, you report it. Not just incidents, near-misses too.<\u002Fli>\n  <\u002Ful>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">7.2&nbsp;&nbsp;<\u002Fspan>Working at heights<\u002Fh3>\n  <p style=\"margin:0 0 10px;\">Working at heights is one of the highest-risk activities a TVH tech does. Specific protocols apply, set out in the heights SOP in Safety Culture. Key principles:<\u002Fp>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\">Fall protection required above the threshold defined in the heights SOP. Where ladders are used, the right ladder, secured, with someone aware.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">If a ladder isn't enough for the work, scaffold or EWP. Don't improvise.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Roof work has its own induction requirement on most TVH sites. Confirm before you go up.<\u002Fli>\n  <\u002Ful>\n  <div style=\"display:flex;gap:14px;background:#E8F5FB;padding:14px 16px;margin:16px 0;break-inside:avoid;\"><div style=\"font-family:Archivo,sans-serif;font-size:10.5px;font-weight:800;letter-spacing:0.09em;color:#007FB0;white-space:nowrap;padding-top:3px;\">SAFETY CULTURE<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.6;\">Full working at heights protocol and risk assessment forms are in Safety Culture › HSEQ › Heights.<\u002Fdiv><\u002Fdiv>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">7.3&nbsp;&nbsp;<\u002Fspan>Electrical safety<\u002Fh3>\n  <p style=\"margin:0 0 10px;\">Whether you're an electrician or a tech working near electrical systems, electrical safety is everyone's business.<\u002Fp>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\">Don't open switchboards you're not licensed to open.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Don't bypass interlocks or guards.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Use lockout/tagout on isolations. Don't trust that someone else won't switch it back on.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Test for dead before you treat it as dead.<\u002Fli>\n  <\u002Ful>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">7.4&nbsp;&nbsp;<\u002Fspan>Hot work<\u002Fh3>\n  <p style=\"margin:0 0 10px;\">Welding, cutting, grinding, any open flame. Hot work permits are required on most TVH customer sites. Your service line SOP and the customer's specific protocol both apply.<\u002Fp>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">7.5&nbsp;&nbsp;<\u002Fspan>Refrigerants and chemicals<\u002Fh3>\n  <p style=\"margin:0 0 10px;\">HVAC and hygiene work in particular brings exposure to refrigerants, cleaning chemicals, and other substances. SDS sheets for everything you use should be in your vehicle or accessible on site. Read them. Use them.<\u002Fp>\n  <div style=\"display:flex;gap:14px;background:#E8F5FB;padding:14px 16px;margin:16px 0;break-inside:avoid;\"><div style=\"font-family:Archivo,sans-serif;font-size:10.5px;font-weight:800;letter-spacing:0.09em;color:#007FB0;white-space:nowrap;padding-top:3px;\">SAFETY CULTURE<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.6;\">Chemical safety, refrigerant handling, SDS sheets are all in Safety Culture › HSEQ › Chemicals.<\u002Fdiv><\u002Fdiv>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">7.6&nbsp;&nbsp;<\u002Fspan>If something goes wrong<\u002Fh3>\n  <table style=\"width:100%;border-collapse:collapse;font-size:13.5px;line-height:1.55;margin:14px 0;\">\n    <thead><tr>\n      <th style=\"background:#26292B;color:#FFFFFF;text-align:left;padding:8px 12px;font-family:Archivo,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;width:40%;\">What<\u002Fth>\n      <th style=\"background:#26292B;color:#FFFFFF;text-align:left;padding:8px 12px;font-family:Archivo,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;\">First action<\u002Fth>\n    <\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:700;color:#26292B;\">Injury (yours or anyone's)<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">First aid first. Then call AM and supervisor. Then report through Safety Culture.<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:700;color:#26292B;\">Property damage on a customer site<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Stop work. Make safe. Call AM. Photograph. Report same day.<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:700;color:#26292B;\">Vehicle incident<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">If anyone is hurt, ambulance first. Then police if required. Then AM and fleet. Don't drive a damaged vehicle if it's unsafe.<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:700;color:#26292B;\">Near-miss (something that could have gone wrong but didn't)<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Report it. Same day. Near-misses are the early warning.<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:700;color:#26292B;\">Hazard discovered on customer site<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Report to AM and customer contact. Don't fix it yourself unless it's your work.<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n  <div style=\"display:flex;gap:14px;background:#E8F5FB;padding:14px 16px;margin:16px 0;break-inside:avoid;\"><div style=\"font-family:Archivo,sans-serif;font-size:10.5px;font-weight:800;letter-spacing:0.09em;color:#007FB0;white-space:nowrap;padding-top:3px;\">SAFETY CULTURE<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.6;\">Full incident reporting, near-miss reporting, and HSEQ escalation pathways are all in Safety Culture › HSEQ › Incidents.<\u002Fdiv><\u002Fdiv>\n\n  <!-- ============ 8. TVH ON DISPLAY ============ -->\n  <h2 data-screen-label=\"8. TVH on display\" style=\"font-family:Archivo,sans-serif;font-size:27px;font-weight:800;letter-spacing:-0.01em;color:#26292B;margin:56px 0 18px;padding-bottom:12px;border-bottom:3px solid #26292B;\"><span style=\"color:#00A3D9;\">8&nbsp;&nbsp;<\u002Fspan>TVH on display<\u002Fh2>\n  <p style=\"margin:0 0 10px;\">When you're on a customer site, you ARE TVH to that customer. They don't know the company; they know you.<\u002Fp>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">8.1&nbsp;&nbsp;<\u002Fspan>Appearance<\u002Fh3>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\">Clean uniform. If your hi-vis is filthy or torn, raise it for replacement.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Boots in reasonable condition. Holes in boots are a safety issue, not a fashion comment.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Personal grooming: clean, neat, presentable.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Vehicle clean inside and out. Customers see the back when you open it. Inside the cab matters too; you'll have customers riding briefly on certain jobs.<\u002Fli>\n  <\u002Ful>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">8.2&nbsp;&nbsp;<\u002Fspan>Behaviour on site<\u002Fh3>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\">Phones are for work, not personal calls. Step away for personal calls; don't take them mid-job in front of a customer.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">No music playing loudly. Some customer sites prohibit it entirely.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">No smoking on customer sites. If you smoke, you do it on your break, off-site, away from the customer's view.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">No swearing audibly on site. We work in defence, government, hospitals. The standard is what those settings expect.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Don't take photos of customer premises unless work-required (e.g. defect documentation). And only of what you need.<\u002Fli>\n  <\u002Ful>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">8.3&nbsp;&nbsp;<\u002Fspan>Social media<\u002Fh3>\n  <p style=\"margin:0 0 10px;\">If you post about work on social media, you're representing TVH whether you meant to or not.<\u002Fp>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\">Don't post photos of customer sites without permission.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Don't post anything that identifies customers or their issues.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Don't post complaints about TVH, customers, colleagues. Raise them internally.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">If you post about a TVH event, behave the way you would if your manager were tagged.<\u002Fli>\n  <\u002Ful>\n  <div style=\"display:flex;gap:14px;background:#E8F5FB;padding:14px 16px;margin:16px 0;break-inside:avoid;\"><div style=\"font-family:Archivo,sans-serif;font-size:10.5px;font-weight:800;letter-spacing:0.09em;color:#007FB0;white-space:nowrap;padding-top:3px;\">SAFETY CULTURE<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.6;\">Full social media and code of conduct policy is in Safety Culture › People › Policy. Material in breach can have employment consequences.<\u002Fdiv><\u002Fdiv>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">8.4&nbsp;&nbsp;<\u002Fspan>The 'TVH on display' test<\u002Fh3>\n  <div style=\"display:flex;gap:14px;background:#26292B;padding:16px 18px;margin:14px 0;break-inside:avoid;\"><div style=\"font-family:Archivo,sans-serif;font-size:10.5px;font-weight:800;letter-spacing:0.09em;color:#E7E614;white-space:nowrap;padding-top:3px;\">THE TEST<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.6;color:#FFFFFF;\">Before you do anything on site, in uniform, or in a TVH vehicle, ask: would I be comfortable if a TVH customer or my manager saw this? If yes, proceed. If no, don't.<\u002Fdiv><\u002Fdiv>\n\n  <!-- ============ 9. DEVELOPMENT ============ -->\n  <h2 data-screen-label=\"9. Your development\" style=\"font-family:Archivo,sans-serif;font-size:27px;font-weight:800;letter-spacing:-0.01em;color:#26292B;margin:56px 0 18px;padding-bottom:12px;border-bottom:3px solid #26292B;\"><span style=\"color:#00A3D9;\">9&nbsp;&nbsp;<\u002Fspan>Your development<\u002Fh2>\n  <p style=\"margin:0 0 10px;\">TVH isn't a place to come, do the work, go home, repeat. It's a place to grow. This section is about how that happens.<\u002Fp>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">9.1&nbsp;&nbsp;<\u002Fspan>Your first 90 days<\u002Fh3>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\"><strong style=\"color:#26292B;\">Days 1 to 30:<\u002Fstrong> structured onboarding (see the 30-Day Framework companion document). You're learning.<\u002Fli>\n    <li style=\"margin:0 0 6px;\"><strong style=\"color:#26292B;\">Day 30:<\u002Fstrong> formal sign-off (independent, conditional, or extended). Your AM and senior tech sign you off.<\u002Fli>\n    <li style=\"margin:0 0 6px;\"><strong style=\"color:#26292B;\">Day 60:<\u002Fstrong> check-in with your AM. 30 minutes, informal. What's working, what isn't, what do you need.<\u002Fli>\n    <li style=\"margin:0 0 6px;\"><strong style=\"color:#26292B;\">Day 90:<\u002Fstrong> more structured review. Performance against role expectations. Development conversation for the next 6 months.<\u002Fli>\n  <\u002Ful>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">9.2&nbsp;&nbsp;<\u002Fspan>Ongoing development<\u002Fh3>\n  <ul style=\"margin:0 0 12px;padding-left:20px;\">\n    <li style=\"margin:0 0 6px;\">Annual performance review with your AM. Not just 'how's the work', but 'where do you want to go from here'.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Training opportunities: ticketed courses, manufacturer training, additional licences. Discuss with your AM.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Mentoring: experienced techs mentor new ones. After your first year, you may be asked to do this. Being a mentor counts for your development too.<\u002Fli>\n    <li style=\"margin:0 0 6px;\">Internal moves: if you're interested in supervision, scheduling, sales, or moving service lines, the conversation starts with your AM.<\u002Fli>\n  <\u002Ful>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">9.3&nbsp;&nbsp;<\u002Fspan>Recognition<\u002Fh3>\n  <p style=\"margin:0 0 10px;\">TVH's recognition style is conversational, not award-based. You'll notice this on day one: your buddy or supervisor will name something specific you did well, in the moment, rather than waiting for a quarterly ceremony.<\u002Fp>\n  <p style=\"margin:0 0 10px;\">Recognition works both ways. If a colleague helped you out, did something well, or went above what was needed, tell them. Tell your AM. The culture is built one specific moment at a time.<\u002Fp>\n\n  <h3 style=\"font-family:Archivo,sans-serif;font-size:17.5px;font-weight:700;color:#26292B;margin:30px 0 8px;\"><span style=\"color:#00A3D9;\">9.4&nbsp;&nbsp;<\u002Fspan>If something's not working<\u002Fh3>\n  <p style=\"margin:0 0 10px;\">Three months in and the role isn't what you expected. The customer mix isn't what you hoped for. You want more variety, or less. You want to learn a different service line.<\u002Fp>\n  <p style=\"margin:0 0 10px;\">Raise it. Don't sit on it for six months. The earliest conversations get the best outcomes. Your AM, your senior tech, or HR via Safety Culture are all places to start.<\u002Fp>\n  <div style=\"display:flex;gap:14px;background:#EAF5EC;padding:14px 16px;margin:16px 0;break-inside:avoid;\"><div style=\"font-family:Archivo,sans-serif;font-size:10.5px;font-weight:800;letter-spacing:0.09em;color:#00813E;white-space:nowrap;padding-top:3px;\">THE TRUTH<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.6;\">People who stay at TVH for years are usually the ones who said something early when something wasn't right. The ones who don't usually leave at 9 months because the small thing they didn't raise became the big thing they couldn't ignore.<\u002Fdiv><\u002Fdiv>\n\n  <!-- ============ 10. WHO TO CALL ============ -->\n  <h2 data-screen-label=\"10. Who to call for what\" style=\"font-family:Archivo,sans-serif;font-size:27px;font-weight:800;letter-spacing:-0.01em;color:#26292B;margin:56px 0 18px;padding-bottom:12px;border-bottom:3px solid #26292B;\"><span style=\"color:#00A3D9;\">10&nbsp;&nbsp;<\u002Fspan>Who to call for what<\u002Fh2>\n  <p style=\"margin:0 0 10px;\">When something comes up, the right call (or the right Teams message) goes a long way. This section is your quick-reference.<\u002Fp>\n  <table style=\"width:100%;border-collapse:collapse;font-size:13.5px;line-height:1.55;margin:14px 0;\">\n    <thead><tr>\n      <th style=\"background:#26292B;color:#FFFFFF;text-align:left;padding:8px 12px;font-family:Archivo,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;width:52%;\">Situation<\u002Fth>\n      <th style=\"background:#26292B;color:#FFFFFF;text-align:left;padding:8px 12px;font-family:Archivo,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;\">Who<\u002Fth>\n    <\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Today's job change, customer access, scheduling question<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:600;color:#26292B;\">Your scheduler<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">A problem on a job you can't resolve solo<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:600;color:#26292B;\">Your senior tech, then AM if no answer<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Customer complaint or escalation<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:600;color:#26292B;\">Your AM, directly<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Vehicle issue (defect, accident, breakdown)<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:600;color:#26292B;\">Fleet (number in vehicle), then your AM<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Tool issue (lost, damaged, broken)<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:600;color:#26292B;\">Your AM or supervisor, then via Safety Culture<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">PPE issue<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:600;color:#26292B;\">Your AM, then via Safety Culture › HSEQ<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Pay or timesheet query<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:600;color:#26292B;\">Payroll via Safety Culture › People › Time<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Leave request<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:600;color:#26292B;\">Your AM, then formally via Safety Culture › People › Leave<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Safety concern (near-miss, hazard, unsafe practice)<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:600;color:#26292B;\">Stop work, raise with AM, report via Safety Culture<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">Anything involving bullying, harassment, discrimination, mental health<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:600;color:#26292B;\">HR directly via Safety Culture › People › Confidential<\u002Ftd><\u002Ftr>\n      <tr><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;\">A question this handbook doesn't answer<\u002Ftd><td style=\"padding:9px 12px;border-bottom:1px solid #DDE0E1;vertical-align:top;font-weight:600;color:#26292B;\">Senior tech, AM, or HR. Don't sit on it.<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n  <div style=\"display:flex;gap:14px;background:#E8F5FB;padding:14px 16px;margin:16px 0;break-inside:avoid;\"><div style=\"font-family:Archivo,sans-serif;font-size:10.5px;font-weight:800;letter-spacing:0.09em;color:#007FB0;white-space:nowrap;padding-top:3px;\">DEFAULT<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.6;\">If you're not sure who to call, default to your AM. They'll either help directly or route you to the right person. Better to ask the wrong person than to sit with a problem.<\u002Fdiv><\u002Fdiv>\n\n  <!-- ============ 11. RECAP ============ -->\n  <h2 data-screen-label=\"11. The handbook, recapped\" style=\"font-family:Archivo,sans-serif;font-size:27px;font-weight:800;letter-spacing:-0.01em;color:#26292B;margin:56px 0 18px;padding-bottom:12px;border-bottom:3px solid #26292B;\"><span style=\"color:#00A3D9;\">11&nbsp;&nbsp;<\u002Fspan>The handbook, recapped<\u002Fh2>\n  <p style=\"margin:0 0 14px;\">If you forget everything else, remember these:<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:0 0 16px;\">\n    <div style=\"border-top:4px solid #00A3D9;background:#F7F8F8;padding:14px 16px;\">\n      <h4 style=\"font-family:Archivo,sans-serif;font-size:12.5px;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;color:#26292B;margin:0 0 8px;\">On the work<\u002Fh4>\n      <ul style=\"margin:0;padding-left:18px;font-size:13.5px;line-height:1.55;\">\n        <li style=\"margin:0 0 6px;\">Update the portal every job, every time, four moments: arrival, on-hold, completion, web notes.<\u002Fli>\n        <li style=\"margin:0 0 6px;\">Web notes assume the next person isn't you.<\u002Fli>\n        <li style=\"margin:0 0 6px;\">If you don't have the right PPE, the job doesn't happen.<\u002Fli>\n        <li style=\"margin:0;\">Stop work authority is yours. Use it if you need to.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div style=\"border-top:4px solid #71BF44;background:#F7F8F8;padding:14px 16px;\">\n      <h4 style=\"font-family:Archivo,sans-serif;font-size:12.5px;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;color:#26292B;margin:0 0 8px;\">On the customer<\u002Fh4>\n      <ul style=\"margin:0;padding-left:18px;font-size:13.5px;line-height:1.55;\">\n        <li style=\"margin:0 0 6px;\">Arrive on time. Tell them before they have to ask if you're late.<\u002Fli>\n        <li style=\"margin:0 0 6px;\">Leave the site cleaner than you found it.<\u002Fli>\n        <li style=\"margin:0 0 6px;\">Don't promise what you can't guarantee.<\u002Fli>\n        <li style=\"margin:0;\">If a customer is unreasonable, call your AM, don't tough it out alone.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div style=\"border-top:4px solid #009D4C;background:#F7F8F8;padding:14px 16px;\">\n      <h4 style=\"font-family:Archivo,sans-serif;font-size:12.5px;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;color:#26292B;margin:0 0 8px;\">On the team<\u002Fh4>\n      <ul style=\"margin:0;padding-left:18px;font-size:13.5px;line-height:1.55;\">\n        <li style=\"margin:0 0 6px;\">Schedulers depend on you closing the loop. Update in real time.<\u002Fli>\n        <li style=\"margin:0 0 6px;\">Recognise colleagues specifically and out loud.<\u002Fli>\n        <li style=\"margin:0;\">Raise problems early. Three months of small grievances becomes one big resignation.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div style=\"border-top:4px solid #E7E614;background:#F7F8F8;padding:14px 16px;\">\n      <h4 style=\"font-family:Archivo,sans-serif;font-size:12.5px;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;color:#26292B;margin:0 0 8px;\">On yourself<\u002Fh4>\n      <ul style=\"margin:0;padding-left:18px;font-size:13.5px;line-height:1.55;\">\n        <li style=\"margin:0 0 6px;\">Take your breaks. Eat lunch. Sleep before callouts.<\u002Fli>\n        <li style=\"margin:0 0 6px;\">Ask for help. Asking is professional, not weak.<\u002Fli>\n        <li style=\"margin:0;\">Your development matters to TVH. Tell us where you want to go.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:flex;gap:14px;background:#26292B;padding:16px 18px;margin:16px 0 24px;break-inside:avoid;\"><div style=\"font-family:Archivo,sans-serif;font-size:10.5px;font-weight:800;letter-spacing:0.09em;color:#E7E614;white-space:nowrap;padding-top:3px;\">THE THREE LAYERS<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.6;color:#FFFFFF;\">This handbook is the operational baseline. Safety Culture is the policy detail. Your AM is the human in the middle. Use all three.<\u002Fdiv><\u002Fdiv>\n\n  <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:48px;padding-top:18px;border-top:1px solid #DDE0E1;\">\n    <img src=\"fb183e39-0e69-4bfc-af78-fa5f165e55ca\" alt=\"TVH mark\" style=\"height:30px;display:block;\">\n    <div style=\"font-family:Archivo,sans-serif;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#9BA0A3;text-align:right;\">Owner: National People Manager · Reviewed annually<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fx-import>\n\n<template id=\"__bundler_thumbnail\"><svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 100 100\"><rect width=\"100\" height=\"100\" fill=\"#26292B\"><\u002Frect><g transform=\"translate(30,32) scale(0.15)\"><path fill=\"#00A3D9\" d=\"M7.5,230 L178.5,230 L178.5,34 Z\"><\u002Fpath><path fill=\"#71BF44\" d=\"M72.5,16.5 L178.5,16.5 L178.5,145 Z\"><\u002Fpath><path fill=\"#009D4C\" d=\"M131.5,88 L178.5,34 L178.5,145 Z\"><\u002Fpath><path fill=\"#E7E614\" d=\"M201,16.5 L246,16.5 L192.5,84 L191.5,84 L191.5,26 Q191.5,16.5 201,16.5 Z\"><\u002Fpath><\u002Fg><\u002Fsvg><\u002Ftemplate><\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;paperSize&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;a4&quot;,&quot;options&quot;:[&quot;letter&quot;,&quot;a4&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Document&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      paperSize: this.props.paperSize ?? 'letter'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
